definitions:
  beansack.BeanAggregate:
    description: BeanAggregate composes a `Bean` with the publisher's display fields
    properties:
      author:
        description: Author is the byline or attributed creator when available from
          the source.
        type: string
      categories:
        description: Categories lists the inferred topics assigned to the content.
        items:
          type: string
        type: array
      cluster_id:
        description: ClusterId identifies the related-content cluster containing this
          Bean.
        type: string
      comments:
        description: Comments is the aggregate number of replies or comments associated
          with this Bean.
        type: integer
      content:
        description: Content is the full body text when the source content is available.
        type: string
      content_type:
        description: Kind is the content type, for example news, blog, post, generated,
          or comment.
        type: string
      entities:
        description: Entities lists named entities such as people, places, organizations,
          or products.
        items:
          type: string
        type: array
      image_url:
        description: ImageUrl is the featured image or preview image associated with
          the content.
        type: string
      likes:
        description: Likes is the aggregate number of likes or upvotes associated
          with this Bean.
        type: integer
      num_related:
        description: ClusterSize is the total number of Beans in the same related-content
          cluster.
        type: integer
      publish_date:
        description: Created is the original publish timestamp of the article or post.
        format: date-time
        type: string
      regions:
        description: Regions lists geographic regions mentioned in or associated with
          the content.
        items:
          type: string
        type: array
      related:
        description: Related lists URLs of semantically or editorially related Beans.
        items:
          type: string
        type: array
      sentiments:
        description: Sentiments lists inferred tones or sentiments expressed in the
          content.
        items:
          type: string
        type: array
      shares:
        description: Shares is the aggregate number of reposts or share-like actions
          associated with this Bean.
        type: integer
      source:
        description: Source is the canonical publisher identifier and matches Publisher.Source.
        type: string
      source_base_url:
        description: BaseURL is the publisher's primary site URL copied onto aggregate
          results for convenience.
        type: string
      source_description:
        description: Description is the publisher description copied onto aggregate
          results.
        type: string
      source_favicon:
        description: Favicon is the publisher favicon URL copied onto aggregate results.
        type: string
      source_site_name:
        description: SiteName is the human-readable name of the publisher copied onto
          aggregate results.
        type: string
      subscribers:
        description: Subscribers is the aggregate audience size associated with this
          Bean's chatter.
        type: integer
      summary:
        description: Summary is a short abstract or teaser used in listings and previews.
        type: string
      tags:
        description: Computed tags merged from categories/regions/entities for display
        items:
          type: string
        type: array
      title:
        description: Title is the human-readable headline or title of the content.
        type: string
      trend_score:
        description: TrendScore is the computed ranking score used to order trending
          results.
        type: number
      url:
        description: URL is the canonical URL of the article or post.
        type: string
    type: object
  beansack.Publisher:
    description: Publisher contains identifying and descriptive information about
      a publisher
    properties:
      source:
        description: Source is the canonical publisher identifier and matches Bean.Source
          values.
        type: string
      source_base_url:
        description: BaseURL is the publisher's primary site URL.
        type: string
      source_description:
        description: Description is a short description of the publisher or content
          source.
        type: string
      source_favicon:
        description: Favicon is the URL of the publisher favicon or brand icon.
        type: string
      source_site_name:
        description: SiteName is the human-readable display name of the publisher.
        type: string
    type: object
info:
  contact:
    email: soumitsrah@cafecito.tech
    name: Project Cafecito
    url: http://cafecito.tech
  description: Beans is an intelligent news & blogs aggregation and search service
    that curates fresh content from RSS feeds using AI-powered natural language queries
    and filters.
  license:
    name: MIT
  title: Beans API & MCP
  version: "0.1"
paths:
  /articles/latest:
    get:
      consumes:
      - application/json
      description: Retrieves the most recently published articles, sorted by publish
        date (newest first).
      parameters:
      - description: optional semantic search query (character length 3-512)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, etc.)
        in: query
        name: kind
        type: string
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher source filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - description: published since date (YYYY-MM-DD, defaults to 7 days ago if omitted)
        format: date
        in: query
        name: from
        type: string
      - default: false
        description: include full article content
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of latest articles sorted by publish date
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "204":
          description: no data available
        "400":
          description: 'bad request: invalid parameters'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get latest articles (reverse chronological)
      tags:
      - Articles
  /articles/search:
    get:
      consumes:
      - application/json
      description: Perform semantic (vector embedding) or tag-based search across
        all articles in the database.
      parameters:
      - description: semantic vector search query (character length 3-512, natural
          language)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0, higher = stricter
          match)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, generated, comment, etc.)
        in: query
        name: content_type
        type: string
      - collectionFormat: csv
        description: specific article URLs to fetch directly (CSV)
        in: query
        items:
          type: string
        name: urls
        type: array
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (AND combination, recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category topic filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise geographic region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise named entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher/source ID filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - description: published/updated since date (ISO 8601 date format YYYY-MM-DD)
        format: date
        in: query
        name: from
        type: string
      - default: false
        description: if true, include full article content (large payload)
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of article aggregates with engagement metrics
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "204":
          description: no data available
        "400":
          description: 'bad request: missing required search parameters or invalid
            input'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search articles
      tags:
      - Articles
  /articles/top-headlines:
    get:
      consumes:
      - application/json
      description: Retrieves top trending headlines from the past 24 hours, ranked
        by trend score.
      parameters:
      - description: optional semantic search query (character length 3-512)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, etc.)
        in: query
        name: content_type
        type: string
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher source filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - default: false
        description: include full article content
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of top headlines from last 24h, sorted by trend_score
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "204":
          description: no data available
        "400":
          description: 'bad request: invalid parameters'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get top headlines (last 24 hours)
      tags:
      - Articles
  /articles/trending:
    get:
      consumes:
      - application/json
      description: 'Retrieves trending articles ranked by trend score. Trend score
        is computed from:'
      parameters:
      - description: optional semantic search query (character length 3-512)
        in: query
        name: q
        type: string
      - default: 0.75
        description: embedding accuracy/similarity threshold (0.0-1.0, higher = stricter)
        in: query
        maximum: 1
        minimum: 0
        name: acc
        type: number
      - description: content type filter (news, blog, post, etc.)
        in: query
        name: content_type
        type: string
      - collectionFormat: csv
        description: case/whitespace-insensitive text search across categories, regions,
          entities (recommended)
        in: query
        items:
          type: string
        name: tags
        type: array
      - collectionFormat: csv
        description: precise category filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: categories
        type: array
      - collectionFormat: csv
        description: precise region filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: regions
        type: array
      - collectionFormat: csv
        description: precise entity filters (inclusive OR, case/whitespace-sensitive)
        in: query
        items:
          type: string
        name: entities
        type: array
      - collectionFormat: csv
        description: publisher source filters (inclusive OR)
        in: query
        items:
          type: string
        name: sources
        type: array
      - description: trending since date (YYYY-MM-DD, defaults to 7 days ago)
        format: date
        in: query
        name: from
        type: string
      - default: false
        description: include full article content
        in: query
        name: full_content
        type: boolean
      - default: 16
        description: page limit
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of trending articles sorted by trend_score (descending)
          schema:
            items:
              $ref: '#/definitions/beansack.BeanAggregate'
            type: array
        "204":
          description: no data available
        "400":
          description: 'bad request: invalid parameters'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database or embedder error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get trending articles
      tags:
      - Articles
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /publishers:
    get:
      description: Retrieves detailed metadata for one or more sources including site
        name, description, favicon.
      parameters:
      - collectionFormat: csv
        description: source IDs to fetch metadata for (comma-separated CSV)
        in: query
        items:
          type: string
        name: sources
        required: true
        type: array
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: array of publisher metadata objects
          schema:
            items:
              $ref: '#/definitions/beansack.Publisher'
            type: array
        "204":
          description: no data available
        "400":
          description: 'bad request: missing or invalid sources parameter'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query source metadata
      tags:
      - Publishers
  /tags/categories:
    get:
      description: Retrieves a paginated list of unique article categories/topics
        discovered in the database.
      parameters:
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: list of category strings
          schema:
            items:
              type: string
            type: array
        "204":
          description: no data available
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List article categories
      tags:
      - Tags
  /tags/entities:
    get:
      description: Retrieves a paginated list of unique named entities (persons, organizations,
        products, places) extracted from articles.
      parameters:
      - default: 16
        description: page limit (items per page)
        in: query
        maximum: 128
        minimum: 1
        name: limit
        type: integer
      - description: pagination offset (number of items to skip)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: list of entity strings
          schema:
            items:
              type: string
            type: array
        "204":
          description: no data available
        "401":
          description: 'unauthorized: missing or invalid API key'
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List named entities
      tags:
      - Tags
  /tags/regions:
    get:
      description: Retrieves a paginated list of unique geographic regions mentioned
