name: Trigger auto deployment for cafecito-beans-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cafecito-beans-api-AutoDeployTrigger-50b526ce-77b9-413d-b57b-09ebfb85ec43.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAFECITOBEANSAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAFECITOBEANSAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAFECITOBEANSAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.CAFECITOBEANSAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAFECITOBEANSAPI_REGISTRY_PASSWORD }}
          containerAppName: cafecito-beans-api
          resourceGroup: frontends-rg
          imageToBuild: soumitsr/beans-api:${{ github.sha }}
          yamlConfigPath: .github/containerapp/containerapp.yaml
          _buildArgumentsKey_: |
            _buildArgumentsValues_


